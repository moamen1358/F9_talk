[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Where to host releases
hosting = "github"
# Whether to auto-include README/LICENSE/etc
auto-includes = true
# Run plan job on PRs to validate config without building
pr-run-mode = "plan"
# Whether to install an updater program
install-updater = false

# Linux system dependencies for GTK, X11, audio, input, whisper-rs
[dist.dependencies.apt]
libasound2-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libdbus-1-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libudev-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libevdev-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libgtk-3-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libayatana-appindicator3-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libxcb1-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libxcb-render0-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libxcb-shape0-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libxcb-xfixes0-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libxkbcommon-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libfontconfig1-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libxdo-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libclang-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
libssl-dev = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
pkg-config = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
cmake = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }

# Use ubuntu-22.04 for Linux builds (matching existing CI)
[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-22.04"
