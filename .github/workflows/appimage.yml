name: AppImage

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  build-appimage:
    name: Build AppImage (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libdbus-1-dev libudev-dev libevdev-dev \
            libgtk-3-dev libayatana-appindicator3-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libfontconfig1-dev libxdo-dev libclang-dev \
            libssl-dev pkg-config cmake libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Build AppImage
        run: |
          chmod +x packaging/appimage/build-appimage.sh
          APPIMAGE_EXTRACT_AND_RUN=1 ./packaging/appimage/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: f9-talk-appimage-x86_64
          path: f9-talk-*-x86_64.AppImage

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" f9-talk-*-x86_64.AppImage --clobber
