name: AppImage

on:
  # Run after the cargo-dist Release workflow finishes so the release is fully published
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build AppImage (x86_64)
    # Only run if Release succeeded and was triggered by a tag (not a PR)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-22.04
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName -q '.[0].tagName')
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libdbus-1-dev libudev-dev libevdev-dev \
            libgtk-3-dev libayatana-appindicator3-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libfontconfig1-dev libxdo-dev libclang-dev \
            libssl-dev pkg-config cmake libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Build AppImage
        run: |
          chmod +x packaging/appimage/build-appimage.sh
          APPIMAGE_EXTRACT_AND_RUN=1 ./packaging/appimage/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: f9-talk-appimage-x86_64
          path: f9-talk-*-x86_64.AppImage

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Uploading AppImage to release $TAG..."
          gh release upload "$TAG" f9-talk-*-x86_64.AppImage --clobber
